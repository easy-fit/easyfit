<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="paymentBrick_container"></div>

    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script>
      const mp = new MercadoPago('TEST-6183029f-7ef1-4cbc-935f-89a5afce3df1');
      const bricksBuilder = mp.bricks();

      const sessionId = '687d3c238fb1d8d40cc7d846';
      const preferenceId = '302608846-dac415d5-541a-47fb-89a7-6312af0c7adc';

      // Add DOM ready check
      function waitForContainer() {
        return new Promise((resolve) => {
          const container = document.getElementById('paymentBrick_container');
          if (container) {
            resolve(container);
          } else {
            setTimeout(() => resolve(waitForContainer()), 100);
          }
        });
      }

      const renderPaymentBrick = async (bricksBuilder) => {
        try {
          console.log('Waiting for container...');
          await waitForContainer();
          console.log('Container ready, initializing Payment Brick...');
          console.log('Using preferenceId:', preferenceId);
          const settings = {
            initialization: {
              amount: 100,
              preferenceId: preferenceId,
            },
            customization: {
              paymentMethods: {
                creditCard: 'all',
                debitCard: 'all',
                mercadoPago: 'all',
              },
            },
            callbacks: {
              onReady: () => {
                console.log('Payment Brick is ready');
              },
              onSubmit: ({ selectedPaymentMethod, formData }) => {
                console.log('Payment submitted:', {
                  selectedPaymentMethod,
                  formData,
                });
                return new Promise((resolve, reject) => {
                  fetch(
                    `http://localhost:3000/api/v1/checkout/${sessionId}/process-payment`,
                    {
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                      },
                      body: JSON.stringify({
                        ...formData,
                        selectedPaymentMethod,
                      }),
                    },
                  )
                    .then((response) => {
                      console.log('Response status:', response.status);
                      if (!response.ok) {
                        throw new Error(
                          `HTTP error! status: ${response.status}`,
                        );
                      }
                      return response.json();
                    })
                    .then((response) => {
                      console.log('Payment response:', response);
                      resolve();
                    })
                    .catch((error) => {
                      console.error('Payment error:', error);
                      reject();
                    });
                });
              },
              onError: (error) => {
                console.error('Payment Brick Error:', error);
                console.error('Error details:', JSON.stringify(error, null, 2));
              },
            },
          };

          console.log('Creating Payment Brick with settings:', settings);
          window.paymentBrickController = await bricksBuilder.create(
            'payment',
            'paymentBrick_container',
            settings,
          );
          console.log('Payment Brick created successfully');
        } catch (error) {
          console.error('Failed to initialize Payment Brick:', error);
          console.error('Error stack:', error.stack);
        }
      };

      // Initialize when DOM is ready
      document.addEventListener('DOMContentLoaded', () => {
        console.log('DOM loaded, starting Payment Brick initialization...');
        renderPaymentBrick(bricksBuilder);
      });

      // Fallback for immediate execution if DOM is already loaded
      if (document.readyState === 'loading') {
        // Do nothing, DOMContentLoaded will fire
      } else {
        // DOM is already ready
        console.log(
          'DOM already ready, starting Payment Brick initialization...',
        );
        renderPaymentBrick(bricksBuilder);
      }
    </script>
  </body>
</html>
